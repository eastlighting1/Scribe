name: Repository Policy Checks

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  repository-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository security checks
        run: python scripts/check_repo_security.py
